name: Weekly NSW Pharmacy Scrape

on:
  schedule:
    - cron: '0 15 * * 0'
  workflow_dispatch:

# Opt into Node.js 24 for JS actions ahead of GitHub's forced migration (2026-06-16).
# Removes the Node 20 deprecation warning; roll back with ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION=true if needed.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Restore previous snapshot
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: snapshot.json
          key: pharmacy-snapshot-
          restore-keys: |
            pharmacy-snapshot-
      - name: Fallback to committed snapshot
        if: steps.cache.outputs.cache-hit != 'true' && hashFiles('snapshot.json') != ''
        run: echo "Using committed snapshot.json as fallback"
      - name: Verify sheet access
        env:
          SHEET_ID: ${{ secrets.SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          python -c "
          import os, sys
          sys.path.insert(0, '.')
          from src.sheets import open_sheet
          sid = (os.environ.get('SHEET_ID') or '1502YpdciO9NSeyzBEr6wf75Y5Gpan-qPXw0elKHve0c').strip().lstrip('﻿')
          print(f'Sheet ID: {sid[:8]}...{sid[-8:]}')
          book = open_sheet(sid, os.environ.get('GOOGLE_SERVICE_ACCOUNT_JSON'))
          print(f'Sheet OK: {book.title}')
          "
      - name: Run scraper
        env:
          SHEET_ID: ${{ secrets.SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python -m src.main
      - name: Cache snapshot
        if: always()
        uses: actions/cache/save@v4
        with:
          path: snapshot.json
          key: pharmacy-snapshot-${{ github.run_id }}
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snapshot
          path: snapshot.json
          retention-days: 90
